version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: arila-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: arila
      POSTGRES_PASSWORD: password
      POSTGRES_DB: arila
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - arila_pgdata:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arila -d arila"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  arila_pgdata:
