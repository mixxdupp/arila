services:
  - type: web
    name: arila
    env: node
    plan: free
    buildCommand: "npm --prefix client install --include=dev && npm --prefix client run build && npm --prefix server install --include=dev && npm --prefix server run build"
    startCommand: "npm --prefix server start"
    envVars:
      - key: NODE_VERSION
        value: "22.18.0"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 10000
